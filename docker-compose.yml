services:
  postgres:
    image: postgres:latest
    container_name: shio_db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  pgadmin:
    container_name: shio-pgadmin
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
      build: .
      container_name: shio_api
      volumes:
        - .:/app 
      ports:
        - "8000:8000"
      env_file: ./.env
      environment:
        - DB_HOST=postgres 
      depends_on:
        - postgres

volumes:
  postgres_data:
  pgadmin_data: